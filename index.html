<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Multi Panorama Project</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    #panorama {
      width: 100%;
      height: 100%;
      position: absolute;
    }

    .menu-panel {
      position: absolute;
      z-index: 20;
      background: rgba(255,255,255,0.95);
      border-radius: 10px;
      padding: 10px;
      min-width: 240px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      display: none;
    }

    .menu-panel button {
      display: block;
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #f2f2f2;
    }

    .menu-panel button:hover {
      background: #ddd;
    }
  </style>
</head>
<body>

<div id="panorama"></div>
<div id="menuPanel" class="menu-panel"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.105.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/pchen66/panolens.js@0.10.2/build/panolens.min.js"></script>

<script>
const panoDown1 = new PANOLENS.ImagePanorama('test.jpeg');
const panoDown2 = new PANOLENS.ImagePanorama('cc.jpeg');
const panoUp = new PANOLENS.ImagePanorama('mewo1.jpeg');
const panoLaundry = new PANOLENS.ImagePanorama('paj1.jpeg');

const viewer = new PANOLENS.Viewer({
  container: document.getElementById('panorama'),
  controlBar: false,
  autoRotate: false,
  output: 'console'
});

viewer.add(panoDown1, panoDown2, panoUp, panoLaundry);
viewer.setPanorama(panoDown1);

// ===== KONWERSJA STOPNI NA POZYCJĘ =====
function degToRad(d){ return d * Math.PI/180; }

function pos(yaw, pitch, r=5000){
  const yR = degToRad(yaw);
  const pR = degToRad(pitch);
  return {
    x: r * Math.sin(yR) * Math.cos(pR),
    y: r * Math.sin(pR),
    z: -r * Math.cos(yR) * Math.cos(pR)
  };
}

// ===== HOTSPOT GO TO =====
function spot(panoFrom, panoTo, label, yaw, pitch){
  const s = new PANOLENS.Infospot(350, PANOLENS.DataImage.Info);
  const p = pos(yaw, pitch);
  s.position.set(p.x, p.y, p.z);
  s.addHoverText(label);

  s.addEventListener('click', ()=>{
    viewer.setPanorama(panoTo);

    // usuwa tekst po kliknięciu
    if (s.hoverElement) {
      s.hoverElement.style.display = 'none';
    }

    closeMenu();
  });

  panoFrom.add(s);
}

// ===== MENU =====
function menu(panoFrom, items, yaw, pitch){
  const s = new PANOLENS.Infospot(380, PANOLENS.DataImage.Arrow);
  const p = pos(yaw, pitch);
  s.position.set(p.x, p.y, p.z);

  s.scale.x = -1; // flip ikony

  // kolor + glow (żeby było widać na białym)
  setTimeout(()=>{
    const img = s.element?.querySelector('img');
    if(img){
      img.style.filter =
        'drop-shadow(0 0 6px white) ' +
        'drop-shadow(0 0 10px hotpink) ' +
        'hue-rotate(300deg) saturate(3)';
    }
  }, 100);

  s.addEventListener('click', (e)=>{
    openMenu(items, e);
  });

  panoFrom.add(s);
}

// ===== PANEL MENU =====
function openMenu(items, e){
  const panel = document.getElementById('menuPanel');
  panel.innerHTML = '';

  items.forEach(i=>{
    const b = document.createElement('button');
    b.textContent = i.label;

    b.onclick = ()=>{
      viewer.setPanorama(i.target);
      closeMenu();
    };

    panel.appendChild(b);
  });

  // pojawia się przy kliknięciu
  panel.style.left = (e.mouseEvent.clientX + 10) + 'px';
  panel.style.top = (e.mouseEvent.clientY + 10) + 'px';
  panel.style.display = 'block';
}

function closeMenu(){
  document.getElementById('menuPanel').style.display = 'none';
}

// ===== HOTSPOTY =====

// test -> cc
spot(panoDown1, panoDown2, 'Go there', 90, -45);

// cc -> test
spot(panoDown2, panoDown1, 'Go there', 100, -45);

// menu downstairs
menu(panoDown1, [
  {label:'Go to upstairs bathroom', target:panoUp},
  {label:'Go to laundry room', target:panoLaundry}
], -2, 0);

menu(panoDown2, [
  {label:'Go to upstairs bathroom', target:panoUp},
  {label:'Go to laundry room', target:panoLaundry}
], 137, 0);

// upstairs
menu(panoUp, [
  {label:'Go to downstairs bathroom', target:panoDown1},
  {label:'Go to laundry room', target:panoLaundry}
], -118, 0);

// laundry
menu(panoLaundry, [
  {label:'Go to upstairs bathroom', target:panoUp},
  {label:'Go to downstairs bathroom', target:panoDown1}
], -128, 0);

</script>

</body>
</html>
